name: CI/CD Pipeline (DB Migration & Heroku Deploy)

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # --- 1. JOB KIỂM TRA THAY ĐỔI FILE ---
  check_changes:
    runs-on: ubuntu-latest
    outputs:
      run_alembic: ${{ steps.filter.outputs.migrations }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Filter changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            migrations:
              - 'src/migrations/versions/**'

  # --- 2. JOB ALEMBIC (Chỉ chạy khi run_alembic == 'true') ---
  alembic:
    needs: check_changes
    if: needs.check_changes.outputs.run_alembic == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v1

      - name: Run Docker Compose
        run: doppler run -p 20206205tech -c prd -- docker compose -f docker-compose.yml up -d
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}

      - name: Check running containers
        run: docker ps

      - name: Preview Changes
        # run: docker exec be-ai sh -c "cd /app/src && alembic upgrade head --sql"
        run: |
          echo "=== Kiểm tra phiên bản Alembic hiện tại ==="
          docker exec be-ai sh -c "cd /app/src && alembic current"

          echo "=== Hiển thị toàn bộ lịch sử Alembic ==="
          docker exec be-ai sh -c "cd /app/src && alembic history"

          echo "=== Kiểm tra các migration chưa chạy (từ current đến head) ==="
          docker exec be-ai sh -c "cd /app/src && alembic history -r current:head"

      - name: Apply Changes
        if: github.ref == 'refs/heads/main'
        run: docker exec be-ai sh -c "cd /app/src && alembic upgrade head"

  # --- 3. JOB DEPLOY (Chạy khi Alembic thành công hoặc bị bỏ qua do không có thay đổi) ---
  deploy-heroku:
    needs: [check_changes, alembic]
    if: |
      always() &&
      !cancelled() &&
      needs.check_changes.result == 'success' &&
      (needs.alembic.result == 'success' || needs.alembic.result == 'skipped') &&
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Heroku Container Registry
        uses: docker/login-action@v3
        with:
          registry: registry.heroku.com
          username: _
          password: ${{ secrets.HEROKU_API_KEY }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: registry.heroku.com/${{ secrets.HEROKU_APP_NAME }}/web
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Release the app on Heroku
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: |
          # Cài đặt Heroku CLI trên Ubuntu runner
          curl https://cli-assets.heroku.com/install.sh | sh

          # Kích hoạt (Release) Docker image vừa đẩy lên để Heroku bắt đầu chạy
          heroku container:release web --app ${{ secrets.HEROKU_APP_NAME }}
